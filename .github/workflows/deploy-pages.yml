name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'index.html'
      - '.github/workflows/deploy-pages.yml'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # release 事件下 github.ref 为标签(refs/tags/*)，会被 github-pages 环境的
  # 部署分支保护拒绝(默认仅允许默认分支)。因此 release 时不直接部署，而是在
  # master 分支上重新触发本工作流；workflow_dispatch 是 GITHUB_TOKEN 可触发的
  # 例外事件(始终创建新的工作流运行)，无需额外 PAT。
  redispatch-on-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-trigger deploy on default branch (master)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-pages.yml --ref master --repo "${{ github.repository }}"

  deploy:
    # push / workflow_dispatch 均运行于 master(refs/heads/master)，可通过环境的分支保护
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update release info
        run: |
          RELEASE=$(curl -sS -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest")

          TAG=$(echo "$RELEASE" | jq -r '.tag_name // "v1.0.0"')
          echo "Latest release: $TAG"

          ASSETS_JSON=$(echo "$RELEASE" | jq -c '[.assets[] | {
            name: .name,
            label: (if (.name | endswith(".msi")) then "下载安装版 (MSI)" elif (.name | endswith(".exe")) then "下载安装版 (NSIS)" else "下载便携版 (ZIP)" end),
            size: ((.size / 1048576 * 10 | floor) / 10 | tostring + " MB"),
            type: (if (.name | endswith(".msi")) then "msi" elif (.name | endswith(".exe")) then "nsis" else "zip" end)
          }]')

          if [ "$ASSETS_JSON" != "[]" ] && [ "$ASSETS_JSON" != "null" ]; then
            sed -i "s|const RELEASE_TAG = '[^']*';|const RELEASE_TAG = '$TAG';|" index.html
            sed -i "s|const RELEASE_ASSETS = \[.*\];|const RELEASE_ASSETS = $ASSETS_JSON;|" index.html
            echo "Release info injected: $TAG"
          else
            echo "No assets found, keeping hardcoded defaults"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
